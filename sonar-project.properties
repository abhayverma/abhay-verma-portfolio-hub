# Project Identification
sonar.projectKey=abhay-verma-portfolio-hub
sonar.projectName=Portfolio Monorepo

# Base Directories to Analyze
sonar.sources=src,apps,packages

# 🛑 THE SHIELD: Exclude third-party, generated, and build files
# This specifically targets the shadcn UI folders we just migrated
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.*,**/*.test.*,src/components/ui/**,packages/shared-ui/src/components/ui/**

# Optional: Coverage exclusions (if you add Jest/Vitest later)
sonar.coverage.exclusions=src/components/ui/**,packages/shared-ui/src/components/ui/**,**/*.d.ts

# Encoding
sonar.sourceEncoding=UTF-8